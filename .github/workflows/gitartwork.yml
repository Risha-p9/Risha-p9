name: Generate GitHub Contribution Graph Artwork

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"   # daily auto update

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Generate contribution graph SVG
        uses: jasineri/gitartwork@v1   # ⚠️ main ki jagah v1 better
        with:
          user_name: risha-p9
          text: RISHABH

      - name: Commit SVG
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update gitartwork.svg"
